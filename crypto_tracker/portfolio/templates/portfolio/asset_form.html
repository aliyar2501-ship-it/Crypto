{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card shadow border-0 rounded-3">
            <div class="card-body p-4">
                <h3 class="fw-bold text-center mb-4">{{ title }}</h3>
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label fw-semibold text-muted small">{{ field.label }}</label>
                            {{ field }}
                        </div>
                    {% endfor %}
                    <div class="d-flex justify-content-between mt-4">
                        <a href="{% url 'portfolio:list' %}" class="btn btn-outline-secondary">Отмена</a>
                        <button type="submit" class="btn btn-warning fw-bold shadow-sm">Сохранить актив</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
